version: '3.8'

services:
  # Backend API Server (Development)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: gcaihub-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=file:../database.db
      - CORS_ORIGIN=http://localhost:8080
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/database.db:/app/database.db
      - ./server/uploads:/app/uploads
    command: npm run dev:server
    restart: unless-stopped
    networks:
      - gcaihub-network

  # Frontend Web Application (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gcaihub-frontend-dev
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - gcaihub-network

networks:
  gcaihub-network:
    driver: bridge
